name: Build and Release Latest

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        run: |
          # Fetch all remote tags to ensure the local index knows about them
          git fetch --tags origin || true

          # Find previous SHA of refs/tags/latest
          PREV_SHA=$(git rev-parse refs/tags/latest 2>/dev/null || echo "")
          echo "Previous release SHA: $PREV_SHA"

          CURRENT_SHA=$(git rev-parse HEAD)
          echo "Current build SHA: $CURRENT_SHA"

          # Write header
          echo "Automatically built from the latest commit." > release_notes.md
          echo "" >> release_notes.md
          echo "### What's Changed" >> release_notes.md

          if [ -n "$PREV_SHA" ] && [ "$PREV_SHA" != "$CURRENT_SHA" ]; then
            git log "$PREV_SHA..HEAD" --pretty=format:"* %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" --no-merges >> release_notes.md
          else
            echo "* Initial release or no new commits since last build." >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Manual Setup" >> release_notes.md
          echo "1. Download and extract 'ani-web.zip'" >> release_notes.md
          echo "2. Run 'npm install --omit=dev' inside the folder" >> release_notes.md
          echo "3. Launch using 'run.bat' (Windows) or 'run.sh' (Linux/Mac)" >> release_notes.md

      - name: Inject Version Date
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.versionDate = new Date().toISOString(); fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));"

      - name: Delete Existing Latest Release
        run: |
          gh release delete "latest" --yes || echo "No previous 'latest' release to delete."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete Existing Latest Tag
        run: |
          git tag -d "latest" || echo "No local 'latest' tag to delete."
          git push origin --delete "latest" || echo "No remote 'latest' tag to delete."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create New Latest Tag
        run: |
          git tag latest
          git push origin latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: |
          npm install

      - name: Build Application
        run: npm run build
        env:
          VITE_TELEMETRY_URL: ${{ secrets.TELEMETRY_URL }}

      - name: Create Release Archive
        run: |
          mkdir -p release-package/client
          mkdir -p release-package/server
          cp -r client/dist release-package/client/
          cp -r server/dist release-package/server/
          cp client/package.json client/package-lock.json release-package/client/
          cp server/package.json release-package/server/
          echo "DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}" > release-package/server/.env
          cp package.json package-lock.json release-package/
          cp LICENSE README.md release-package/
          cp orchestrator.js release-package/

          echo "#!/bin/bash" > release-package/run.sh
          echo "node orchestrator.js prod" >> release-package/run.sh

          echo "@echo off" > release-package/run.bat
          echo "node orchestrator.js prod" >> release-package/run.bat

          chmod +x release-package/run.sh

          cd release-package
          zip -r ../ani-web.zip .

      - name: Create New Latest Release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "latest" \
            "ani-web.zip" \
            --title "latest (v$VERSION)" \
            --notes-file release_notes.md \
            --target ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        run: |
          echo "DISCORD_CLIENT_ID=$DISCORD_CLIENT_ID" > server/.env
          PREV_VERSION=$(npm view ani-web version 2>/dev/null || echo "")
          npm publish --access public
          if [ -n "$PREV_VERSION" ]; then
            npm unpublish ani-web@$PREV_VERSION --force
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VITE_TELEMETRY_URL: ${{ secrets.TELEMETRY_URL }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
